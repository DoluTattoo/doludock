name: Release

# Build doludock and publish a GitHub Release whenever a version tag is pushed.
#   git tag v0.2.0
#   git push origin v0.2.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the release and upload assets

jobs:
  release:
    name: Build & publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "doludock version: $version"

      # No -G: let CMake pick the newest installed Visual Studio generator, so this
      # keeps working when windows-latest moves from VS 2022 to VS 2026.
      - name: Configure (CMake / MSVC x64)
        run: cmake -S . -B build -A x64

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build/Release/doludock.exe dist/ -Force
          Copy-Item LICENSE dist/LICENSE.txt -Force
          Copy-Item README.md dist/README.md -Force

      - name: Build portable zip
        shell: pwsh
        run: |
          $zip = "doludock-${{ steps.ver.outputs.version }}-portable-x64.zip"
          Compress-Archive -Path dist/* -DestinationPath $zip -Force
          Write-Host "Created $zip"

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $cmd = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($cmd) { $iscc = $cmd.Source } else { throw "Inno Setup (ISCC.exe) not found on the runner." }
          }
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" "packaging\doludock.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.ver.outputs.version }}"
          $tag     = "${{ github.ref_name }}"
          $zip     = "doludock-$version-portable-x64.zip"
          $setup   = "packaging\Output\doludock-$version-setup.exe"
          if (-not (Test-Path $setup)) { throw "Installer not found: $setup" }

          # Idempotent: create the release, or just (re)upload assets if it already exists.
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists - uploading assets (clobber)."
            gh release upload $tag $zip $setup --clobber
          } else {
            Write-Host "Creating release $tag."
            gh release create $tag $zip $setup --title "doludock $version" --generate-notes
          }
